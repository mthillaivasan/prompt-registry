# Prompt-library seed fixture.
#
# Entries with empty `full_text` are skipped (status 'skipped_empty') so the
# fixture can hold placeholders awaiting paste.
#
# Entries missing any of prompt_type, input_type, output_type, summary,
# topic_coverage or classification_notes are classified by Haiku during seed.
# Haiku writes a one-sentence rationale into classification_notes so a human
# can see why each tag was picked.
#
# Idempotent on title. Re-running the seed skips existing titles unless
# --update is passed to scripts/seed_library.py.
#
# Topic IDs come from docs/CHECKLIST_DESIGN.md §B1 (Extraction).
#
# Source-provenance note. Drop L1 spec called for ~15-20 entries fetched
# from docs.claude.com/en/resources/prompt-library. That source has been
# deprecated since the original drop — every former library URL now
# redirects to a single "Prompting best practices" page with no per-prompt
# entries to scrape. The fixture below uses hand-authored starter entries
# instead, leaving most classification fields blank so the seeder's Haiku
# auto-tag path (the load-bearing capability) is still exercised on first
# load. Entries are intended as *starter content* — replace as the firm's
# own gold-standard library accumulates.


entries:
- title: Lombard — Prospectus key-data extraction
  full_text: ''
  domain: finance
  source_provenance: Lombard internal prompt library
- title: Lombard — Client suitability assessment
  full_text: ''
  domain: finance
